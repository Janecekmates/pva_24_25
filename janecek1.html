<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <title>WRC</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }



        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        .l-heading {
            font-size: 4rem;
            margin-bottom: 0.75rem;
            line-height: 1.1;
        }
        .lead {
            font-size: 1.3rem;
            margin-bottom: 2rem;
        }
        
        .btn {
            display: inline-block;
            color: black;
            background-color: #5A524A;
            padding: 0.5rem 2rem;
            border: none;
            border-radius: 5px;
            text-decoration: none;
        }

        .btn:hover {
            background: #514942;
        }

        #navbar {
            background-color: #B4A494;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
        }

        #navbar ul {
            display: flex;
            list-style: none;
        }
        #navbar .logo {
            margin: 0 12px;
            font-size: larger;
            font-weight: bold;
        }
        
        
        #navbar ul li a {
            text-decoration: none;
            margin: 0 4px;
            padding:  12px;
            text-decoration: none;
            border-radius: 5px;
            text-transform: capitalize;
            color: black;
        }
        #navbar ul li a:hover {
            background-color: aqua;
            color: white;
        }
        #showcase {
            background: #333 url('./img/ogier.jpg') no-repeat center center/cover;
            height: 100vh;
            color: white;

        }

        #showcase .showcase-content {
            display: flex;
            flex-direction: column;
            text-align: center;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 0 2rem;
            background-color: rgba(0,0,0,0.5);
        }


    </style>
</head>
<body>
    <nav id="navbar">
        <div class="logo"><i class="fa-solid fa-car"></i>WRC/Rally</div>
        <ul>
            <li><a href="http://127.0.0.1:5500/posadky.html"><i class="fa-solid fa-car"></i>Posádky</a></li>
            <li><a href="#Podniky"><i class="fa-solid fa-calendar-days"></i>Podniky</a></li>
            <li><a href="#Šampioni"><i class="fa-solid fa-trophy"></i>Šampioni</a></li>
        </ul>
    </nav>
<!-- header: Showcase -->
    <div id="showcase">
        <div class="showcase-content">
            <h1 class="l-heading">Mistrovství světa v rallye</h1>
            <p class="lead">Mistrovství světa v automobilových soutěžích.</p>
            <a href="https://www.wrc.com/" class="btn">Chci vědět víc</a>
        </div>
    </div>

    <!-- Photo by <a href="https://unsplash.com/@neilthomas?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash">Neil Mark Thomas</a> on <a href="https://unsplash.com/photos/people-watching-passing-race-car-JYYa9FEPxd4?utm_content=creditCopyText&utm_medium=referral&utm_source=unsplash">Unsplash</a> -->
  
</body>
</html>
